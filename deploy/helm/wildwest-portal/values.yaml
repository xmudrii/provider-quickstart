replicaCount: 1

image:
  repository: ghcr.io/platform-mesh/provider-quickstart-portal
  pullPolicy: IfNotPresent
  tag: "@sha256:492e26c751201806f4fab02cc67294a74f9b2b2e0de7534b63ba9aec8543d5f6"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 101

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: portal.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  namespace: platform-mesh-system
  hostnames:
    - portal.localhost
    - "*.portal.localhost"
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: k8sapi-gateway
      namespace: platform-mesh-system
  pathPrefix: /cowboys
  filters:
    - extensionRef:
        group: traefik.io
        kind: Middleware
        name: wildwest-portal-cors
      type: ExtensionRef
  referenceGrant:
    enabled: true
    fromNamespace: platform-mesh-system

middleware:
  enabled: false
  namespace: platform-mesh-system
  corsOrigins:
    - http://localhost:4200
    - http://*.localhost:4200
    - https://portal.localhost:8443
    - https://*.portal.localhost:8443

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}
